apiVersion: v1
kind: Service
metadata:
  name: k8s-gcp-app-service
  namespace: production
  labels:
    app: k8s-gcp-app
spec:
  selector:
    app: k8s-gcp-app
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 3000
  # LoadBalancer directly creates GCP Network Load Balancer
  # Simpler and more reliable than Ingress for single service
  type: LoadBalancer
