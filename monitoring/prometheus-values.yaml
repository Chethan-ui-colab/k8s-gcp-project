grafana:
  enabled: true
  adminUser: admin
  adminPassword: "Admin@123"

  service:
    type: LoadBalancer
    port: 80
    annotations:
      networking.gke.io/load-balancer-type: "External"

  persistence:
    enabled: false

  resources:
    requests:
      memory: "128Mi"
      cpu: "50m"
    limits:
      memory: "256Mi"
      cpu: "200m"

  defaultDashboardsEnabled: true
  defaultDashboardsTimezone: Asia/Kolkata

  grafana.ini:
    analytics:
      reporting_enabled: false
      check_for_updates: false
    log:
      level: warn

prometheus:
  enabled: true

  prometheusSpec:
    retention: 3d

    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: "standard"
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 5Gi

    resources:
      requests:
        memory: "200Mi"
        cpu: "50m"
      limits:
        memory: "400Mi"
        cpu: "200m"

    scrapeInterval: "30s"
    evaluationInterval: "30s"
    podMonitorSelectorNilUsesHelmValues: false
    serviceMonitorSelectorNilUsesHelmValues: false

alertmanager:
  enabled: true

  alertmanagerSpec:
    resources:
      requests:
        memory: "32Mi"
        cpu: "5m"
      limits:
        memory: "64Mi"
        cpu: "25m"

    storage:
      volumeClaimTemplate:
        spec:
          storageClassName: "standard"
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 1Gi

nodeExporter:
  enabled: true

kubeStateMetrics:
  enabled: true
